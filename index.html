<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, 'Segoe UI', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    background: #0a0c0f;
    color: #e8e4da;
    display: flex; flex-direction: column;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    user-select: none;
  }
  .topbar {
    display: flex; justify-content: center; gap: 10px;
    padding: 18px 16px 6px;
  }
  .tab {
    padding: 10px 26px;
    border: 1px solid rgba(201,138,75,0.5);
    color: #c98a4b;
    font-size: 14px; font-weight: 700; letter-spacing: 2px;
    background: transparent;
    cursor: pointer;
  }
  .tab.active { background: #c98a4b; color: #101318; }
  .stage {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 12px;
    gap: 20px;
  }
  .card-img {
    width: 100%;
    max-width: 560px;
    border: 1px solid rgba(201,138,75,0.35);
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    display: none;
  }
  .card-img.show { display: block; }
  .qr-btn {
    padding: 14px 34px;
    background: #c98a4b; color: #101318;
    border: none; font-size: 15px; font-weight: 800; letter-spacing: 2px;
    cursor: pointer;
  }
  .hint { color: #4a5058; font-size: 12px; text-align: center; padding-bottom: 14px; }

  /* QR fullscreen overlay */
  .qr-overlay {
    position: fixed; inset: 0;
    background: #ffffff;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    z-index: 10;
    padding: 24px;
  }
  .qr-overlay.show { display: flex; }
  .qr-overlay img {
    width: min(78vw, 78vh, 420px);
    image-rendering: pixelated;
  }
  .qr-overlay .who { color: #101318; font-size: 17px; font-weight: 700; letter-spacing: 1px; }
  .qr-overlay .close-hint { color: #8a8f96; font-size: 13px; }
</style>
</head>
